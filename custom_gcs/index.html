<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom GCS Mutia</title>
    <!-- Library Socket.io -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        span { font-weight: bold; color: #007bff; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Dashboard Telemetri Drone</h1>

    <div class="dashboard">
        <div class="card">
            <p>Roll: <span id="roll">0</span>°</p>
            <p>Pitch: <span id="pitch">0</span>°</p>
            <p>Yaw: <span id="yaw">0</span>°</p>
        </div>
        <div class="card">
            <p>Lat: <span id="lat">0</span></p>
            <p>Lng: <span id="lng">0</span></p>
            <p>Alt: <span id="alt">0</span> m</p>
        </div>
    </div>

    <script>
        // Hubungkan ke server Flask (pastikan port 5000 sesuai)
        const socket = io('http://localhost:5000');

        socket.on('connect', () => {
            console.log('Terhubung ke Server GCS!');
        });

        socket.on('telemetry_data', (data) => {
            // Update data Attitude (mengonversi radian ke derajat jika perlu)
            // Python pymavlink biasanya mengirim dalam satuan radian.
            // Jika ingin derajat, kalikan data.roll * (180/Math.PI)
            document.getElementById('roll').innerText = (data.roll * (180/Math.PI)).toFixed(2);
            document.getElementById('pitch').innerText = (data.pitch * (180/Math.PI)).toFixed(2);
            document.getElementById('yaw').innerText = (data.yaw * (180/Math.PI)).toFixed(2);

            // Update data Posisi
            document.getElementById('lat').innerText = data.lat.toFixed(7);
            document.getElementById('lng').innerText = data.lng.toFixed(7);
            document.getElementById('alt').innerText = data.alt.toFixed(2);
        });

        socket.on('disconnect', () => {
            console.log('Terputus dari server.');
        });
    </script>
</body>
</html>
